---
- name: Bootstrap common Linux configuration
  hosts: all
  become: true
  gather_facts: true

  vars:
    common_packages:
      - curl
      - wget
      - vim
      - nano
      - unzip
      - zip
      - git
      - htop
      - net-tools
      - dnsutils
      - ca-certificates
      - software-properties-common
      - apt-transport-https
      - chrony
      - qemu-guest-agent
      - python3
      - python3-pip

  pre_tasks:

    - name: Ensure Debian-based system
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          This playbook only supports Debian/Ubuntu.
        success_msg: >
          Debian based OS detected.

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600


  tasks:

    - name: Upgrade system packages
      ansible.builtin.apt:
        upgrade: dist


    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present


    - name: Configure timezone
      ansible.builtin.command:
        cmd: timedatectl set-timezone {{ timezone }}
      changed_when: false


    - name: Enable and start chrony
      ansible.builtin.systemd:
        name: chrony
        enabled: true
        state: started


    - name: Enable qemu guest agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started


    - name: Ensure SSH service enabled
      ansible.builtin.systemd:
        name: ssh
        enabled: true
        state: started


    - name: Create admin maintenance directory
      ansible.builtin.file:
        path: /opt/admin
        state: directory
        owner: root
        group: root
        mode: "0755"


    - name: Create bootstrap marker
      ansible.builtin.copy:
        content: |
          TO5 Infrastructure Bootstrap Complete
          Managed by Ansible
          Date: {{ ansible_date_time.iso8601 }}
        dest: /opt/admin/bootstrap.info
        owner: root
        group: root
        mode: "0644"
