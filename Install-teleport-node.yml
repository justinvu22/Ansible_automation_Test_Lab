---
- name: Install and configure Teleport Nodes
  hosts: teleport_nodes
  become: true
  gather_facts: true


  vars:

    teleport_arch: "amd64"
    teleport_platform: "linux"

    teleport_archive: >
      teleport-v{{ teleport_version }}-{{ teleport_platform }}-{{ teleport_arch }}-bin.tar.gz

    teleport_download_url: >
      https://cdn.teleport.dev/{{ teleport_archive }}

    teleport_install_dir: "/tmp/teleport-install"


  pre_tasks:

    - name: Validate Debian based system
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "Only Ubuntu/Debian systems are supported."


    - name: Validate Teleport join token exists
      ansible.builtin.assert:
        that:
          - lookup('env','TELEPORT_JOIN_TOKEN') | length > 0
        fail_msg: >
          TELEPORT_JOIN_TOKEN environment variable is required.
          Example:
          export TELEPORT_JOIN_TOKEN=<token>


    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - gzip
          - ca-certificates
        state: present
        update_cache: true


  tasks:

  ################################################
  # Install Teleport binaries
  ################################################

    - name: Create temporary install directory
      ansible.builtin.file:
        path: "{{ teleport_install_dir }}"
        state: directory
        mode: "0755"


    - name: Download Teleport archive
      ansible.builtin.get_url:
        url: "{{ teleport_download_url }}"
        dest: "/tmp/{{ teleport_archive }}"
        mode: "0644"


    - name: Extract Teleport archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ teleport_archive }}"
        dest: "{{ teleport_install_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1


    - name: Install Teleport binaries
      ansible.builtin.copy:
        src: "{{ teleport_install_dir }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: true
        mode: "0755"
      loop:
        - teleport
        - tsh


  ################################################
  # Configuration
  ################################################

    - name: Create Teleport data directory
      ansible.builtin.file:
        path: /var/lib/teleport
        state: directory
        owner: root
        group: root
        mode: "0700"


    - name: Deploy Teleport node configuration
      ansible.builtin.template:
        src: ../templates/teleport-node.yaml.j2
        dest: /etc/teleport.yaml
        owner: root
        group: root
        mode: "0600"
      vars:
        teleport_join_token: "{{ lookup('env', 'TELEPORT_JOIN_TOKEN') }}"
      notify:
        - restart teleport


    - name: Deploy Teleport systemd service
      ansible.builtin.template:
        src: ../templates/teleport.service.j2
        dest: /etc/systemd/system/teleport.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart teleport


    - name: Apply handlers immediately
      ansible.builtin.meta: flush_handlers


  ################################################
  # Start Teleport
  ################################################

    - name: Enable and start Teleport
      ansible.builtin.systemd:
        name: teleport
        enabled: true
        state: started


  ################################################
  # Verification
  ################################################

    - name: Wait for Teleport SSH service
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 3022
        timeout: 30


    - name: Verify Teleport service is active
      ansible.builtin.systemd:
        name: teleport
      register: teleport_service


    - name: Display Teleport service state
      ansible.builtin.debug:
        msg:
          - "Teleport state: {{ teleport_service.status.ActiveState }}"
          - "Node: {{ inventory_hostname }}"


    - name: Verify Teleport version
      ansible.builtin.command:
        cmd: teleport version
      register: teleport_version_output
      changed_when: false


    - name: Display installed version
      ansible.builtin.debug:
        var: teleport_version_output.stdout


  handlers:

    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true


    - name: restart teleport
      ansible.builtin.systemd:
        name: teleport
        state: restarted
