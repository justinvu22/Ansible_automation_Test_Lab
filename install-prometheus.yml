---
- name: Install and configure Prometheus Server
  hosts: monitoring
  become: true
  gather_facts: true


  vars:

    prometheus_arch_map:
      x86_64: amd64
      aarch64: arm64


    prometheus_arch: >
      {{ prometheus_arch_map[ansible_architecture] }}


    prometheus_archive: >
      prometheus-{{ prometheus_version }}.linux-{{ prometheus_arch }}.tar.gz


    prometheus_download_url: >
      https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/{{ prometheus_archive }}


    prometheus_tmp_dir: /tmp/prometheus-install


  pre_tasks:

    - name: Validate supported architecture
      ansible.builtin.assert:
        that:
          - ansible_architecture in prometheus_arch_map
        fail_msg: >
          Unsupported architecture: {{ ansible_architecture }}


    - name: Validate Debian based OS
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          Only Ubuntu/Debian systems are supported.


    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - gzip
          - ca-certificates
        state: present
        update_cache: true


  tasks:

    ################################################
    # User and directories
    ################################################

    - name: Create Prometheus group
      ansible.builtin.group:
        name: "{{ prometheus_group }}"
        system: true


    - name: Create Prometheus user
      ansible.builtin.user:
        name: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false


    - name: Create Prometheus installation directory
      ansible.builtin.file:
        path: "{{ prometheus_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"


    - name: Create Prometheus configuration directory
      ansible.builtin.file:
        path: "{{ prometheus_config_dir }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0755"


    - name: Create Prometheus data directory
      ansible.builtin.file:
        path: "{{ prometheus_data_dir }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0750"


    ################################################
    # Download and install binaries
    ################################################

    - name: Create temporary directory
      ansible.builtin.file:
        path: "{{ prometheus_tmp_dir }}"
        state: directory
        mode: "0755"


    - name: Download Prometheus archive
      ansible.builtin.get_url:
        url: "{{ prometheus_download_url }}"
        dest: "/tmp/{{ prometheus_archive }}"
        mode: "0644"


    - name: Extract Prometheus archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ prometheus_archive }}"
        dest: "{{ prometheus_tmp_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1


    - name: Install Prometheus binaries
      ansible.builtin.copy:
        src: "{{ prometheus_tmp_dir }}/{{ item }}"
        dest: "{{ prometheus_dir }}/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      loop:
        - prometheus
        - promtool


    ################################################
    # Configuration
    ################################################

    - name: Deploy Prometheus configuration
      ansible.builtin.template:
        src: ../templates/prometheus.yml.j2
        dest: "{{ prometheus_config_dir }}/prometheus.yml"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_group }}"
        mode: "0644"
      notify:
        - Restart Prometheus


    - name: Validate Prometheus configuration
      ansible.builtin.command:
        cmd: >
          {{ prometheus_dir }}/promtool
          check config
          {{ prometheus_config_dir }}/prometheus.yml
      changed_when: false


    - name: Deploy Prometheus systemd service
      ansible.builtin.template:
        src: ../templates/prometheus.service.j2
        dest: /etc/systemd/system/prometheus.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Prometheus


    - name: Apply handlers immediately
      ansible.builtin.meta: flush_handlers


    ################################################
    # Service startup
    ################################################

    - name: Enable and start Prometheus
      ansible.builtin.systemd:
        name: prometheus
        enabled: true
        state: started


    ################################################
    # Health checks
    ################################################

    - name: Wait for Prometheus HTTP endpoint
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ prometheus_port }}"
        timeout: 60


    - name: Check Prometheus API status
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ prometheus_port }}/api/v1/status/runtimeinfo"
        status_code: 200
      register: prometheus_api


    - name: Display Prometheus version
      ansible.builtin.command:
        cmd: "{{ prometheus_dir }}/prometheus --version"
      register: prometheus_version_output
      changed_when: false


    - name: Show Prometheus information
      ansible.builtin.debug:
        msg:
          - "Prometheus API: OK"
          - "{{ prometheus_version_output.stdout_lines[0] }}"


  handlers:

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true


    - name: Restart Prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted
