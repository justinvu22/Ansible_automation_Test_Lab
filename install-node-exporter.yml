---
- name: Install Prometheus Node Exporter
  hosts: monitor_targets
  become: true
  gather_facts: true

  vars:

    node_exporter_arch_map:
      x86_64: amd64
      aarch64: arm64

    node_exporter_arch: >
      {{ node_exporter_arch_map[ansible_architecture] }}

    node_exporter_archive: >
      node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz

    node_exporter_url: >
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_archive }}

    node_exporter_tmp_dir: /tmp/node_exporter


  pre_tasks:

    - name: Validate supported architecture
      ansible.builtin.assert:
        that:
          - ansible_architecture in node_exporter_arch_map
        fail_msg: >
          Unsupported architecture: {{ ansible_architecture }}

    - name: Ensure Debian based OS
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          Only Debian/Ubuntu systems are supported.


    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - tar
          - gzip
        state: present
        update_cache: true


  tasks:

    #################################################
    # User and directories
    #################################################

    - name: Create node_exporter user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false


    - name: Create Node Exporter directory
      ansible.builtin.file:
        path: "{{ node_exporter_dir }}"
        state: directory
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: "0755"


    #################################################
    # Download and install binary
    #################################################

    - name: Create temporary directory
      ansible.builtin.file:
        path: "{{ node_exporter_tmp_dir }}"
        state: directory
        mode: "0755"


    - name: Download Node Exporter
      ansible.builtin.get_url:
        url: "{{ node_exporter_url }}"
        dest: "/tmp/{{ node_exporter_archive }}"
        mode: "0644"


    - name: Extract Node Exporter archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ node_exporter_archive }}"
        dest: "{{ node_exporter_tmp_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1


    - name: Install Node Exporter binary
      ansible.builtin.copy:
        src: "{{ node_exporter_tmp_dir }}/node_exporter"
        dest: "{{ node_exporter_dir }}/node_exporter"
        owner: "{{ node_exporter_user }}"
        group: "{{ node_exporter_user }}"
        mode: "0755"
        remote_src: true


    #################################################
    # Systemd service
    #################################################

    - name: Deploy Node Exporter service
      ansible.builtin.template:
        src: ../templates/node-exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Node Exporter


    - name: Apply handlers
      ansible.builtin.meta: flush_handlers


    - name: Enable and start Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started


    #################################################
    # Health checks
    #################################################

    - name: Wait for Node Exporter port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ node_exporter_port }}"
        timeout: 30


    - name: Check Node Exporter metrics endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ node_exporter_port }}/metrics"
        return_content: false
        status_code: 200


    - name: Check installed Node Exporter version
      ansible.builtin.command:
        cmd: "{{ node_exporter_dir }}/node_exporter --version"
      register: node_exporter_version_output
      changed_when: false


    - name: Display Node Exporter version
      ansible.builtin.debug:
        var: node_exporter_version_output.stdout_lines


  handlers:

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true


    - name: Restart Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
